output_model_name: vit_cfc_test
subdir: vit_cfc_test
ckpt_path: null
pretrained_weights_path: null
num_workers: 2
train_split: 0.9
seed: 3072
img_size: 96
embed_dim: 32
history_size: 3
trainer:
  max_epochs: 1
  devices: auto
  accelerator: cpu
  precision: 16
  gradient_clip_val: 1.0
loader:
  batch_size: 16
  num_workers: ${num_workers}
  persistent_workers: true
  prefetch_factor: 3
  pin_memory: true
optimizer:
  type: AdamW
  lr: 5.0e-05
  weight_decay: 0.001
num_preds: 3
loss:
  sigreg:
    weight: 0.05
    kwargs:
      knots: 9
      num_proj: 256
wandb:
  enabled: false
  config:
    entity: lewm
    project: lewm
    name: ${output_model_name}
    id: ${subdir}
    resume: allow
    log_model: false
data:
  dataset:
    num_steps: ${eval:'${num_preds} + ${history_size}'}
    frameskip: 3
    name: d:/ai_training/bionic_hand_dataset_v3_96.h5
    keys_to_load:
    - pixels
    - action
    keys_to_cache:
    - action
model:
  _target_: jepa.JEPA
  encoder:
    _target_: module.TinyViT
    img_size: 96
    patch_size: 8
    num_layers: 4
    hidden_dim: 64
    num_heads: 4
    mlp_dim: 256
    output_dim: 32
  predictor:
    _target_: module.CfCPredictorV2
    num_frames: ${history_size}
    input_dim: 32
    hidden_dim: 64
    output_dim: 32
    action_dim: 32
    backbone_layers: 1
    backbone_units: 64
  action_encoder:
    _target_: module.Embedder
    input_dim: ???
    smoothed_dim: 8
    emb_dim: 32
    mlp_scale: 2
  projector: null
  pred_proj: null
augmentation: false

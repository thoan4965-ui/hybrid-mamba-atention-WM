hydra:
  run:
    dir: outputs/${now:%Y-%m-%d}/${now:%H-%M-%S}
  sweep:
    dir: multirun/${now:%Y-%m-%d}/${now:%H-%M-%S}
    subdir: ${hydra.job.num}
  launcher:
    _target_: hydra._internal.core_plugins.basic_launcher.BasicLauncher
  sweeper:
    _target_: hydra._internal.core_plugins.basic_sweeper.BasicSweeper
    max_batch_size: null
    params: null
  help:
    app_name: ${hydra.job.name}
    header: '${hydra.help.app_name} is powered by Hydra.

      '
    footer: 'Powered by Hydra (https://hydra.cc)

      Use --hydra-help to view Hydra specific help

      '
    template: '${hydra.help.header}

      == Configuration groups ==

      Compose your configuration from those groups (group=option)


      $APP_CONFIG_GROUPS


      == Config ==

      Override anything in the config (foo.bar=value)


      $CONFIG


      ${hydra.help.footer}

      '
  hydra_help:
    template: 'Hydra (${hydra.runtime.version})

      See https://hydra.cc for more info.


      == Flags ==

      $FLAGS_HELP


      == Configuration groups ==

      Compose your configuration from those groups (For example, append hydra/job_logging=disabled
      to command line)


      $HYDRA_CONFIG_GROUPS


      Use ''--cfg hydra'' to Show the Hydra config.

      '
    hydra_help: ???
  hydra_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][HYDRA] %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
    root:
      level: INFO
      handlers:
      - console
    loggers:
      logging_example:
        level: DEBUG
    disable_existing_loggers: false
  job_logging:
    version: 1
    formatters:
      simple:
        format: '[%(asctime)s][%(name)s][%(levelname)s] - %(message)s'
    handlers:
      console:
        class: logging.StreamHandler
        formatter: simple
        stream: ext://sys.stdout
      file:
        class: logging.FileHandler
        formatter: simple
        filename: ${hydra.runtime.output_dir}/${hydra.job.name}.log
    root:
      level: INFO
      handlers:
      - console
      - file
    disable_existing_loggers: false
  env: {}
  mode: RUN
  searchpath: []
  callbacks: {}
  output_subdir: .hydra
  overrides:
    hydra:
    - hydra.mode=RUN
    task:
    - trainer.accelerator=cpu
    - trainer.max_epochs=1
    - loader.batch_size=16
    - model=vit_tiny_cfc
    - data=bionic_hand_v2
    - img_size=96
    - embed_dim=32
    - loss.sigreg.weight=0.05
    - loss.sigreg.kwargs.knots=9
    - loss.sigreg.kwargs.num_proj=256
    - output_model_name=vit_cfc_test
    - subdir=vit_cfc_test
    - +augmentation=False
  job:
    name: train
    chdir: null
    override_dirname: +augmentation=False,data=bionic_hand_v2,embed_dim=32,img_size=96,loader.batch_size=16,loss.sigreg.kwargs.knots=9,loss.sigreg.kwargs.num_proj=256,loss.sigreg.weight=0.05,model=vit_tiny_cfc,output_model_name=vit_cfc_test,subdir=vit_cfc_test,trainer.accelerator=cpu,trainer.max_epochs=1
    id: ???
    num: ???
    config_name: lewm
    env_set: {}
    env_copy: []
    config:
      override_dirname:
        kv_sep: '='
        item_sep: ','
        exclude_keys: []
  runtime:
    version: 1.3.2
    version_base: '1.3'
    cwd: D:\ai_training\le-wm
    config_sources:
    - path: hydra.conf
      schema: pkg
      provider: hydra
    - path: D:\ai_training\le-wm\config\train
      schema: file
      provider: main
    - path: ''
      schema: structured
      provider: schema
    output_dir: D:\ai_training\le-wm\outputs\2026-06-07\12-10-02
    choices:
      model: vit_tiny_cfc
      data: bionic_hand_v2
      launcher: local
      hydra/env: default
      hydra/callbacks: null
      hydra/job_logging: default
      hydra/hydra_logging: default
      hydra/hydra_help: default
      hydra/help: default
      hydra/sweeper: basic
      hydra/launcher: basic
      hydra/output: default
  verbose: false
